# One command to run the whole stack locally: `docker compose up --build`
#   api  -> the unified SPA (Angular UI + .NET API) on http://localhost:8080
#   sqlserver -> Azure SQL Edge, data persisted in a named volume
#   redis -> distributed cache backing cache-aside reads (Phase 23)
#
# Containers talk to each other over the default compose network using the SERVICE
# NAME as DNS hostname (e.g. the API reaches the DB at "sqlserver,1433", not localhost).
services:
  api:
    build:
      context: .
      dockerfile: TrackerAPI/Dockerfile
    container_name: shadowboard-api
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        # Don't start the API until SQL reports healthy — Program.cs runs
        # db.Database.Migrate() at boot and needs the server listening.
        condition: service_healthy
      redis:
        # Not gated on health: if Redis is briefly unavailable the cache layer falls
        # through to the database, so the API can start alongside it.
        condition: service_started
    environment:
      # Service name "sqlserver" resolves via compose DNS to the DB container.
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ShadowBoardDb;User Id=sa;Password=SuperStrong!Passw0rd2026;TrustServerCertificate=True;
      # Config via env vars (the 12-factor way) instead of baking secrets into the image.
      # Double underscore maps to the ASP.NET Core config section separator (Jwt:SecretKey).
      - Jwt__SecretKey=SuperSecretShadowBoardTrackerKey2026!!
      # Compose DNS: the API reaches Redis by its service name "redis" on 6379. When set,
      # Program.cs backs IDistributedCache with Redis; unset, it falls back to memory cache.
      - Redis__ConnectionString=redis:6379
      - ASPNETCORE_ENVIRONMENT=Production
      # Email transport (prod). Values come from the gitignored .env (Brevo SMTP), NOT
      # committed. `docker compose up` also loads docker-compose.override.yml, which points
      # these at the local smtp4dev catcher for dev; prod runs base only (see README).
      - Email__Host=${EMAIL_HOST:-}
      - Email__Port=${EMAIL_PORT:-587}
      - Email__User=${EMAIL_USER:-}
      - Email__Password=${EMAIL_PASSWORD:-}
      - Email__FromEmail=${EMAIL_FROM:-noreply@shadowboard.local}
      - Email__FromName=${EMAIL_FROM_NAME:-ShadowBoard Tracker}
      - Email__UseStartTls=${EMAIL_STARTTLS:-true}

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: shadowboard-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SuperStrong!Passw0rd2026
    volumes:
      # Named volume: the database files survive `docker compose down` and restarts.
      # (A bind mount would tie data to a host path; a named volume is managed by Docker.)
      - sqldata:/var/opt/mssql
    healthcheck:
      # azure-sql-edge does not ship sqlcmd on a stable path, so probe the TCP port with
      # bash instead — good enough as a readiness gate, and the API additionally retries
      # transient connection failures (EnableRetryOnFailure) during startup migration.
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: shadowboard-redis
    ports:
      - "6379:6379"
    # Backs IDistributedCache for cache-aside reads (boards + tool name/type lists).
    # The API connects via Redis__ConnectionString=redis:6379 (set on the api service).

volumes:
  sqldata:
